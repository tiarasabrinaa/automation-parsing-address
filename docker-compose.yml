services:
  mongo:
    image: mongo:7
    container_name: automation-omo-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
      MONGO_INITDB_DATABASE: automation_omo
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: automation-omo-backend
    env_file:
      - ./backend/.env
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - MONGODB_URI=mongodb://root:rootpassword@mongo:27017/?authSource=admin
      - MONGODB_DB_NAME=automation_omo
      - JWT_SECRET_KEY=change-this-secret
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - mongo
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  mongo_data: